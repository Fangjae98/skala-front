<html>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <div class="container">
            <h1> 🌏 광주 여행 일지 ✈️ </h1>

            <audio controls>

            <hr>
        
            <h2> 📸 광주에서의 추억 </h2>
        <div class="trip-grid-container">
            <p class="trip-card">
                <img src="../media/전망타워.jpg" alt="전망타워" style="width:400px;height:200px;">

                광주 전망타워 🗼

            <p class="trip-card">

                <br>
                송정역시장 🛒

        </div>
            <hr>

            <h2> 📽️ 나의 여행 브이로그 </h2>
            <video width="400" height="240" controls autoplay>

            <p> 여행 노래와 함께~🎶 </p>
